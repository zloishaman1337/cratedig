name: release

# Build per-OS installers. Triggered on a version tag or manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (no leading v)"
        required: true
        default: "0.1.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-14        # arm64
            target: macos
          - os: macos-13        # x64
            target: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        run: pip install ".[gui,analysis,download,metadata,build]"

      # --- ffmpeg/ffplay into packaging/bin/<os>/ ---------------------------
      - name: Fetch ffmpeg (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $u = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest $u -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath ff
          $bin = Get-ChildItem ff -Recurse -Filter ffmpeg.exe | Select-Object -First 1 | Split-Path
          New-Item -ItemType Directory -Force packaging/bin/windows | Out-Null
          Copy-Item "$bin/ffmpeg.exe","$bin/ffplay.exe" packaging/bin/windows/

      - name: Fetch ffmpeg (macOS)
        if: matrix.target == 'macos'
        run: |
          mkdir -p packaging/bin/macos
          for tool in ffmpeg ffplay; do
            curl -L "https://evermeet.cx/ffmpeg/getrelease/$tool/zip" -o "$tool.zip"
            unzip -o "$tool.zip" -d packaging/bin/macos
          done
          chmod +x packaging/bin/macos/*

      - name: Render icons
        run: python packaging/render_icons.py

      - name: PyInstaller build
        run: pyinstaller packaging/cratedig.spec --noconfirm

      # --- package ----------------------------------------------------------
      - name: Inno Setup installer (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVersion=${{ steps.ver.outputs.version }} packaging\windows\cratedig.iss
          Copy-Item packaging\windows\Output\cratedig-setup-*.exe dist\

      - name: DMG (macOS)
        if: matrix.target == 'macos'
        run: |
          brew install create-dmg || true
          bash packaging/macos/make_dmg.sh ${{ steps.ver.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: cratedig-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
