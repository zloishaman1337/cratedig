# Local config. See config.example.toml for documentation on every key.

[paths]
db = "data/cratedig.db"
download_dir = "data/downloads"
library_dirs = ["example/samples"]
saved_dir = "data/_saved"

[audio]
analysis_sr = 22050
extensions = [".wav", ".aiff", ".aif", ".flac", ".mp3", ".ogg", ".m4a"]

[sources]
strategy = "combined"
default = "youtube"
order = ["youtube", "yandex"]

[sources.youtube]
audio_format = "wav"

[sources.yandex]
# token = ""   # paste OAuth token here, OR keep token_file below
token_file = "example/yamdl/token.txt"

[sources.freesound]
# Paste your FreeSound APIv2 token here (see config.example.toml for how to get one).
token = "D7zu7zgd6VFishV8O6kBPHAwK827iPpVSgliRvCW"

[metadata]
